<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../css/shop.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <navbar>
      <div class="nav container1">
        <div class="texts">
          <h2>Store</h2>
          <p>Home</p>
          <p>Products</p>
          <p>Categories</p>
        </div>
        <div class="icons">
          <div class="theme-switcher" style="position: relative">
            <i class="ri-sun-line" id="themeBtn" style="cursor: pointer"></i>
            <div class="dropdown-menu" id="themeDropdown">
              <div class="dropdown-item" id="lightMode">Light</div>
              <div class="dropdown-item" id="darkMode">Dark</div>
              <div class="dropdown-item" id="systemMode">System</div>
            </div>
          </div>
          <i class="ri-heart-line" style="position:relative"><span id="like" class="nav-badge">0</span></i>
          <i class="ri-shopping-cart-line" style="position:relative"><span id="shop" class="nav-badge">0</span></i>
          <div class="flex"><i class="ri-user-line"></i>Login</div>
        </div>
      </div>
    </navbar>
<div class="px2"></div>
    <div class="cart-page-container">
      <h1 id="heartToIndex"><i class="ri-arrow-left-line"></i>Orqaga</h1>
      
      <div class="cart-layout">
        
        <div class="cart-items-section">
          <div id="cart-items-container">
            </div>
          
          <div class="cart-actions-bottom" id="cart-actions" style="display: none;">
            <button id="continue-shopping-btn" class="outline-btn">Continue Shopping</button>
          </div>
        </div>

        <div class="order-summary-section">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-row">
            <span>Tax</span>
            <span id="tax">$0.00</span>
          </div>
          <hr class="summary-divider">
          <div class="summary-row total-row">
            <span>Total</span>
            <span id="total">$0.00</span>
          </div>
          <button class="checkout-btn">Checkout <i class="ri-arrow-right-line"></i></button>
        </div>
        
      </div>
    </div>

    <div class="px2"></div>
    <footer id="footer"></footer>
    <script type="module" src="../js/shop.js"></script>
  </body>
</html>
